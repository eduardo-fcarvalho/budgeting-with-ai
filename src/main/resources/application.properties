spring.application.name=budgeting
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.response-format.type=TEXT
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.transcription.options.model=whisper-1
spring.ai.openai.transcription.options.language=pt
spring.ai.openai.transcription.options.temperature=0
spring.ai.openai.transcription.options.response-format=text
spring.ai.openai.transcription.options.prompt=Audio em portugues brasileiro. \
  Audio contem descricao de gastos financeiros. \
  As frases geralmente contem: \
    - um valor em reais (numero + "reais"); \
    - uma acao (gastei, paguei, comprei); \
    - um local ou estabelecimento (mercado, farmácia, restaurante, loja, etc.). \

spring.ai.model.audio.speech=openai
spring.ai.model.audio.speech.options.model=gpt-4o-mini-tts
spring.ai.model.audio.speech.options.voice=nova
spring.ai.model.audio.speech.options.speed=1.2
spring.ai.model.audio.speech.options.response-format=mp3
logging.level.org.springframework.ai=DEBUG