spring.application.name=budgeting
spring.ai.openai.api-key=${OPENAI_API_KEY}

spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.response-format.type=TEXT
spring.ai.openai.chat.options.temperature=0.7

spring.ai.openai.transcription.options.model=whisper-1
spring.ai.openai.transcription.options.language=pt
spring.ai.openai.transcription.options.temperature=0
spring.ai.openai.transcription.options.response-format=text
spring.ai.openai.transcription.options.prompt=Áudio em português brasileiro. \
  Áudio contém descrição de gastos financeiros. \
  As frases geralmente contém: \
    - um valor em reais (número + "reais"); \
    - uma ação (gastei, paguei, comprei); \
    - um local ou estabelecimento (mercado, farmácia, restaurante, loja, etc.). \

logging.level.org.springframework.ai=DEBUG